title: Jaurice Research Notes
author: Jaurice O'Connor
logo: assets/random_walk_3d.png

execute:
  execute_notebooks: force

repository:
  url: https://github.com/jauricestudios/jaurice-market-notes
  branch: main

html:
  use_issues_button: false
  use_repository_button: true
  use_edit_page_button: false
  use_download_button: false
  home_page_in_navbar: false
  extra_navbar: ""
  extra_footer: ""

theme:
  name: sphinx_book_theme
  options:
    default_mode: dark

sphinx:
  config:
    html_static_path:
      - "_static"
    html_css_files:
      - "custom.css"
    html_title: "Jaurice O'Connor | Risk Analytics Portfolio"